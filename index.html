    <!-- Google Maps API - Deferred loading -->
    <script>
      let mapsLoaded = false;
      
      function initMap() {
        console.log("Google Maps API loaded successfully");
        window.googleMapsLoaded = true;
      }
      
      function gm_authFailure() {
        console.error("Google Maps authentication error");
        document.querySelectorAll('.map-error-message').forEach(el => {
          el.classList.remove('hidden');
        });
      }
      
      // Load Google Maps only when needed (on scroll or interaction)
      function loadGoogleMaps() {
        if (mapsLoaded) return;
        mapsLoaded = true;
        
        const script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyAtYACJIt9-FsJ41OdF1fPwx9-1kcU8wI0&callback=initMap';
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
      }
      
      // Trigger maps loading after initial page load
      window.addEventListener('load', () => {
        setTimeout(loadGoogleMaps, 3000); // Load after 3 seconds
      });
      
      // Add performance mark for initial load
      if (window.performance) {
        window.performance.mark('app_start');
      }
      
      // Preload loading GIF after DOMContentLoaded
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(() => {
          var img = new Image();
          img.src = "https://i.imgur.com/5YtDgG9.gif";
        }, 2000);
      });

      // Dynamic OG image based on language
      function updateOGImage() {
        const urlParams = new URLSearchParams(window.location.search);
        const langParam = urlParams.get('lang');
        const savedLang = localStorage.getItem('preferredLanguage');
        const currentLang = langParam || savedLang || 'KR';
        
        // Image URLs for different languages
        const ogImages = {
          'KR': 'https://tunisiatrip.kr/og-image.png',
          'EN': 'https://tunisiatrip.kr/og-image.png'
        };
        
        const imageUrl = ogImages[currentLang] || ogImages['KR'];
        
        // Update OG image meta tags
        const ogImage = document.querySelector('meta[property="og:image"]');
        const twitterImage = document.querySelector('meta[property="twitter:image"]');
        
        if (ogImage) ogImage.setAttribute('content', imageUrl);
        if (twitterImage) twitterImage.setAttribute('content', imageUrl);
      }

      // Update OG image on page load and language change
      document.addEventListener('DOMContentLoaded', updateOGImage);
      window.addEventListener('storage', function(e) {
        if (e.key === 'preferredLanguage') {
          updateOGImage();
        }
      });
    </script>
